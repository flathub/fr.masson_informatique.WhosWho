---

app-id: fr.masson_informatique.WhosWho
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: whoswho
cleanup:
  - "/bin/distro"
  - "/include/*"
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --talk-name=org.gtk.vfs.*
  - --filesystem=xdg-run/gvfsd

modules:
  # needed to build python3-Pillow
  - python3-pybind11.json
  # needed to build python3-numpy
  - python3-meson-python.json
  # needed to build opencv
  - python3-scikit-build.json
  - python3-numpy.json
  # WhosWho dependencies
  - python3-chardet.json
  - python3-Pillow.json
  - python3-Willow.json
  - opencv.yml
  - imagemagick.yml


  - name: WhosWho
    buildsystem: simple
    build-commands:
      - ./build-translations.py
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} --no-deps --no-build-isolation .
    sources:
      - type: archive
        url: https://framagit.org/Yvan-Masson/WhosWho/-/archive/v2.2/WhosWho-v2.3.tar.gz
        sha256: cd42a26d073c269c930b93e4a089ed5793defa4758aef2c57170e527122b33ec
